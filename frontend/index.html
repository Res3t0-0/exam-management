
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ExamVault — Online Exam Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:       #0a0e1a;
    --surface:  #111827;
    --surface2: #1a2235;
    --border:   #1e2d45;
    --accent:   #3b82f6;
    --accent2:  #06b6d4;
    --gold:     #f59e0b;
    --green:    #10b981;
    --red:      #ef4444;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --white:    #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .layout { display: flex; min-height: 100vh; }
  .sidebar {
    width: 240px; min-height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh;
    overflow-y: auto;
  }
  .logo {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .logo-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .logo-sub { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }
  .nav { padding: 12px 0; flex: 1; }
  .nav-section { padding: 8px 20px 4px; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; font-family: 'DM Mono', monospace; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 20px; cursor: pointer;
    font-size: 13.5px; color: var(--muted);
    transition: all 0.15s; border-left: 3px solid transparent;
    font-weight: 400;
  }
  .nav-item:hover { color: var(--text); background: var(--surface2); }
  .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(59,130,246,0.08); font-weight: 500; }
  .nav-icon { font-size: 15px; width: 18px; text-align: center; }
  .main { flex: 1; padding: 28px 32px; overflow-y: auto; }
  .page-header { margin-bottom: 28px; }
  .page-title { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700; color: var(--white); }
  .page-sub { font-size: 13px; color: var(--muted); margin-top: 4px; font-family: 'DM Mono', monospace; }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px;
    position: relative; overflow: hidden;
  }
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .stat-val { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--white); }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .stat-icon { position: absolute; right: 16px; top: 16px; font-size: 22px; opacity: 0.4; }
  .toolbar {
    display: flex; gap: 12px; align-items: center;
    margin-bottom: 18px; flex-wrap: wrap;
  }
  .search-box {
    flex: 1; min-width: 220px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 14px;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13.5px;
    outline: none; transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }
  .btn {
    padding: 9px 18px; border-radius: 8px; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #2563eb; }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  .btn-danger:hover { background: rgba(239,68,68,0.25); }
  .btn-success { background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
  .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 6px; }
  .table-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
  }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: var(--surface2); }
  thead th {
    padding: 12px 16px; text-align: left;
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px;
    white-space: nowrap; font-weight: 500;
  }
  tbody tr { border-top: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 11px 16px; color: var(--text); white-space: nowrap; }
  .code { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent2); }
  .nav-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 16px; border-top: 1px solid var(--border);
    background: var(--surface2);
  }
  .nav-bar span { font-size: 12px; color: var(--muted); margin: 0 8px; font-family: 'DM Mono', monospace; }
  .badge {
    display: inline-block; padding: 2px 9px; border-radius: 99px;
    font-size: 11px; font-weight: 500; font-family: 'DM Mono', monospace;
  }
  .badge-a    { background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
  .badge-b    { background: rgba(59,130,246,0.15); color: var(--accent); border: 1px solid rgba(59,130,246,0.3); }
  .badge-c    { background: rgba(245,158,11,0.15); color: var(--gold); border: 1px solid rgba(245,158,11,0.3); }
  .badge-fail { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  .badge-pass { background: rgba(16,185,129,0.15); color: var(--green); }
  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; width: 500px; max-width: 95vw;
    max-height: 90vh; overflow-y: auto;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  }
  .modal-title {
    font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700;
    color: var(--white); margin-bottom: 20px;
  }
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-label .required { color: var(--red); margin-left: 2px; }
  .form-label .hint { color: var(--muted); font-size: 10px; margin-left: 6px; font-weight: 400; text-transform: none; opacity: 0.7; }
  .form-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13.5px;
    outline: none; transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input.invalid { border-color: var(--red); }
  .form-input option { background: var(--surface); }
  .field-error { font-size: 11px; color: var(--red); margin-top: 4px; font-family: 'DM Mono', monospace; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .modal-section { font-size: 11px; color: var(--accent2); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 20px;
    font-size: 13.5px; z-index: 2000;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    animation: slideUp 0.3s ease;
    max-width: 320px;
  }
  .toast.success { border-left: 3px solid var(--green); }
  .toast.error   { border-left: 3px solid var(--red);   }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .grade-legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
  .grade-item {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    padding: 10px 16px; border-radius: 8px;
  }
  .grade-score { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }
  .welcome {
    background: linear-gradient(135deg, #1e3a5f 0%, #0f2a4a 100%);
    border: 1px solid #1e4a7a; border-radius: 14px; padding: 28px;
    margin-bottom: 24px; position: relative; overflow: hidden;
  }
  .welcome::after {
    content: '📚'; position: absolute; right: 28px; top: 50%;
    transform: translateY(-50%); font-size: 56px; opacity: 0.15;
  }
  .welcome h2 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; color: var(--white); }
  .welcome p  { font-size: 13.5px; color: #94a3b8; margin-top: 6px; }
  .empty { text-align: center; padding: 48px; color: var(--muted); font-size: 13.5px; }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }
  hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  .section-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; color: var(--white); margin-bottom: 12px; }
  .info-box {
    background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.2);
    border-radius: 8px; padding: 12px 16px; font-size: 12.5px; color: #93c5fd;
    margin-bottom: 16px; font-family: 'DM Mono', monospace; line-height: 1.6;
  }
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, useCallback } = React;
const API = 'http://localhost:5000/api';

// ── Grade Calculator ──────────────────────────────────────────
function calcGrade(m) {
  const n = parseFloat(m);
  if (n >= 90) return { grade: 'A', status: 'Pass' };
  if (n >= 75) return { grade: 'B', status: 'Pass' };
  if (n >= 50) return { grade: 'C', status: 'Pass' };
  return { grade: 'Fail', status: 'Fail' };
}

// ── Validation helpers ────────────────────────────────────────
const validators = {
  required:    v => (!v || String(v).trim() === '') ? 'This field is required' : null,
  email:       v => v && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v) ? 'Invalid email format' : null,
  phone:       v => v && !/^\d{10}$/.test(v) ? 'Must be exactly 10 digits' : null,
  semester:    v => v && (parseInt(v) < 1 || parseInt(v) > 8) ? 'Semester must be 1–8' : null,
  credits:     v => v && (parseInt(v) < 1 || parseInt(v) > 10) ? 'Credits must be 1–10' : null,
  marks:       v => v !== '' && v !== undefined && (parseFloat(v) < 0 || parseFloat(v) > 100) ? 'Marks must be 0–100' : null,
  duration:    v => v && (parseInt(v) < 10 || parseInt(v) > 300) ? 'Duration must be 10–300 minutes' : null,
  totalMarks:  v => v && (parseInt(v) < 1 || parseInt(v) > 500) ? 'Total marks must be 1–500' : null,
  qMarks:      v => v && (parseInt(v) < 1 || parseInt(v) > 100) ? 'Question marks must be 1–100' : null,
  insCode:     v => v && !/^[A-Z0-9_-]{3,20}$/.test(v) ? 'Use 3–20 uppercase letters/digits only' : null,
  regNo:       v => v && !/^[A-Z0-9]{5,20}$/.test(v) ? 'Use 5–20 uppercase alphanumeric characters' : null,
  courseID:    v => v && !/^[A-Z0-9]{3,20}$/.test(v) ? 'Use 3–20 uppercase alphanumeric characters' : null,
  posInt:      v => v && (isNaN(parseInt(v)) || parseInt(v) <= 0) ? 'Must be a positive integer' : null,
};

function validate(rules, values) {
  const errors = {};
  for (const [key, fns] of Object.entries(rules)) {
    for (const fn of fns) {
      const err = fn(values[key]);
      if (err) { errors[key] = err; break; }
    }
  }
  return errors;
}

// ── Toast ─────────────────────────────────────────────────────
function Toast({ msg, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3500); return () => clearTimeout(t); }, []);
  return React.createElement('div', { className: `toast ${type}` }, msg);
}

// ── Badge helpers ─────────────────────────────────────────────
function GradeBadge({ grade }) {
  const cls = { A: 'badge-a', B: 'badge-b', C: 'badge-c', Fail: 'badge-fail' }[grade] || 'badge-c';
  return React.createElement('span', { className: `badge ${cls}` }, grade);
}
function StatusBadge({ status }) {
  return React.createElement('span', {
    className: `badge ${status === 'Pass' ? 'badge-pass' : 'badge-fail'}`
  }, status);
}

// ── Nav Bar ───────────────────────────────────────────────────
function NavBar({ idx, total, onFirst, onPrev, onNext, onLast }) {
  if (total === 0) return null;
  return React.createElement('div', { className: 'nav-bar' },
    React.createElement('button', { className: 'btn btn-ghost btn-sm', onClick: onFirst }, '⏮ First'),
    React.createElement('button', { className: 'btn btn-ghost btn-sm', onClick: onPrev, disabled: idx === 0 }, '◀ Prev'),
    React.createElement('span', null, `Record ${idx + 1} of ${total}`),
    React.createElement('button', { className: 'btn btn-ghost btn-sm', onClick: onNext, disabled: idx === total - 1 }, 'Next ▶'),
    React.createElement('button', { className: 'btn btn-ghost btn-sm', onClick: onLast }, 'Last ⏭'),
  );
}

// ── Reusable DataTable ────────────────────────────────────────
function DataTable({ columns, data, onAdd, onEdit, onDelete, searchPlaceholder, addLabel }) {
  const [search, setSearch] = useState('');
  const [navIdx, setNavIdx] = useState(0);
  const filtered = data.filter(row =>
    Object.values(row).some(v => String(v ?? '').toLowerCase().includes(search.toLowerCase()))
  );
  useEffect(() => { setNavIdx(0); }, [search]);
  return React.createElement('div', null,
    React.createElement('div', { className: 'toolbar' },
      React.createElement('input', {
        className: 'search-box',
        placeholder: searchPlaceholder || '🔍  Search records...',
        value: search,
        onChange: e => setSearch(e.target.value)
      }),
      onAdd && React.createElement('button', { className: 'btn btn-primary', onClick: onAdd }, addLabel || '+ Add New'),
    ),
    React.createElement('div', { className: 'table-card' },
      React.createElement('div', { className: 'table-wrap' },
        React.createElement('table', null,
          React.createElement('thead', null,
            React.createElement('tr', null,
              ...columns.map(c => React.createElement('th', { key: c.key }, c.label)),
              (onEdit || onDelete) && React.createElement('th', null, 'ACTIONS')
            )
          ),
          React.createElement('tbody', null,
            filtered.length === 0
              ? React.createElement('tr', null,
                  React.createElement('td', { colSpan: columns.length + 1, className: 'empty' },
                    React.createElement('div', { className: 'empty-icon' }, '🗂'),
                    'No records found'
                  )
                )
              : filtered.map((row, i) =>
                  React.createElement('tr', {
                    key: i,
                    style: navIdx === i ? { background: 'rgba(59,130,246,0.12)' } : {},
                    onClick: () => setNavIdx(i)
                  },
                    ...columns.map(c =>
                      React.createElement('td', { key: c.key },
                        c.render ? c.render(row[c.key], row) :
                        c.code ? React.createElement('span', { className: 'code' }, row[c.key]) :
                        (row[c.key] ?? '—')
                      )
                    ),
                    (onEdit || onDelete) && React.createElement('td', null,
                      React.createElement('div', { style: { display: 'flex', gap: 6 } },
                        onEdit   && React.createElement('button', { className: 'btn btn-ghost btn-sm',  onClick: e => { e.stopPropagation(); onEdit(row); } }, '✏️'),
                        onDelete && React.createElement('button', { className: 'btn btn-danger btn-sm', onClick: e => { e.stopPropagation(); onDelete(row); } }, '🗑')
                      )
                    )
                  )
                )
          )
        )
      ),
      React.createElement(NavBar, {
        idx: navIdx, total: filtered.length,
        onFirst: () => setNavIdx(0),
        onPrev:  () => setNavIdx(i => Math.max(0, i - 1)),
        onNext:  () => setNavIdx(i => Math.min(filtered.length - 1, i + 1)),
        onLast:  () => setNavIdx(filtered.length - 1),
      })
    )
  );
}

// ── Modal Form (with inline validation) ──────────────────────
function Modal({ title, fields, values, onChange, onSave, onClose, extra, errors }) {
  return React.createElement('div', { className: 'modal-overlay', onClick: e => e.target === e.currentTarget && onClose() },
    React.createElement('div', { className: 'modal' },
      React.createElement('div', { className: 'modal-title' }, title),
      ...fields.map(f => {
        if (f.type === 'section') return React.createElement('div', { className: 'modal-section', key: f.key }, f.label);
        const err = errors && errors[f.key];
        return React.createElement('div', { className: 'form-group', key: f.key },
          React.createElement('label', { className: 'form-label' },
            f.label,
            f.required && React.createElement('span', { className: 'required' }, ' *'),
            f.hint && React.createElement('span', { className: 'hint' }, f.hint)
          ),
          f.type === 'select'
            ? React.createElement('select', {
                className: `form-input${err ? ' invalid' : ''}`,
                value: values[f.key] || '',
                onChange: e => onChange(f.key, e.target.value)
              },
                React.createElement('option', { value: '' }, `— Select ${f.label} —`),
                ...f.options.map(o => React.createElement('option', { key: o.value, value: o.value }, o.label))
              )
            : f.type === 'textarea'
            ? React.createElement('textarea', {
                className: `form-input${err ? ' invalid' : ''}`, rows: 3,
                value: values[f.key] || '', placeholder: f.placeholder,
                onChange: e => onChange(f.key, e.target.value)
              })
            : React.createElement('input', {
                className: `form-input${err ? ' invalid' : ''}`,
                type: f.type || 'text',
                value: values[f.key] || '',
                placeholder: f.placeholder,
                min: f.min, max: f.max,
                onChange: e => onChange(f.key, e.target.value)
              }),
          err && React.createElement('div', { className: 'field-error' }, '⚠ ' + err)
        );
      }),
      extra,
      React.createElement('div', { className: 'modal-actions' },
        React.createElement('button', { className: 'btn btn-ghost', onClick: onClose }, 'Cancel'),
        React.createElement('button', { className: 'btn btn-primary', onClick: onSave }, 'Save')
      )
    )
  );
}

function GradeCalculator() {
  const [marks, setMarks] = useState('');
  const result = marks !== '' ? calcGrade(marks) : null;
  return React.createElement('div', { style: { display: 'flex', gap: 12, alignItems: 'center', flexWrap: 'wrap' } },
    React.createElement('input', {
      className: 'form-input', type: 'number', min: 0, max: 100,
      placeholder: 'Enter marks (0–100)', style: { width: 220 },
      value: marks, onChange: e => setMarks(e.target.value)

      React.createElement('span', { style: { color: 'var(--muted)', fontSize: 13 } }, 'Grade:'),
      React.createElement(GradeBadge, { grade: result.grade }),
      React.createElement('span', { style: { color: 'var(--muted)', fontSize: 13 } }, 'Status:'),
      React.createElement(StatusBadge, { status: result.status }),

}

  const load = () => fetch(`${API}/students`).then(r => r.json()).then(setData).catch(() => setData(DEMO_STUDENTS));

    reg_no:     [validators.required, validators.regNo],

    department: [validators.required],

    phone:      [validators.phone],
    semester:   [validators.required, validators.semester],
    department: [validators.required],
  };

  const save = async () => {
    const rules = modal.isNew ? RULES_NEW : RULES_EDIT;

    const url    = modal.isNew ? `${API}/students` : `${API}/students/${modal.reg_no}`;

    try {
      const r = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      const j = await r.json();
      if (!r.ok) throw new Error(j.error || 'Save failed');
      toast('Student saved ✓', 'success'); setModal(null); load();

    React.createElement('div', { className: 'page-header' },

      React.createElement('div', { className: 'page-sub' }, 'Manage student registrations')

      onAdd: () => { setForm({}); setErrors({}); setModal({ isNew: true }); },

      onSave: save, onClose: () => setModal(null),

// ══════════════════════════════════════════════════════════════
function ResultsPage({ toast }) {
  const [data, setData]     = useState([]);
  const [modal, setModal]   = useState(null);
  const [form, setForm]     = useState({});
  const [errors, setErrors] = useState({});
  const [preview, setPreview] = useState(null);

  const load = () => fetch(`${API}/attempts/results/all`).then(r => r.json()).then(setData).catch(() => setData(DEMO_RESULTS));
  useEffect(() => { load(); }, []);

  const RULES_NEW  = { attempt_ID: [validators.required, validators.posInt], marks_obtained: [validators.required, validators.marks] };
  const RULES_EDIT = { marks_obtained: [validators.required, validators.marks] };

  const save = async () => {
    const errs = validate(modal.isNew ? RULES_NEW : RULES_EDIT, form);
    if (Object.keys(errs).length) { setErrors(errs); return; }
    const url    = modal.isNew ? `${API}/attempts/results` : `${API}/attempts/results/${modal.result_ID}`;
    const method = modal.isNew ? 'POST' : 'PUT';
    try {
      const r = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(form) });
      const j = await r.json();
      if (!r.ok) throw new Error(j.error || 'Save failed');
      toast(`Saved — Grade: ${j.grade || preview?.grade}`, 'success'); setModal(null); load();
    } catch (e) { toast(e.message, 'error'); }
  };

  const del = async row => {
    if (!confirm('Delete this result?')) return;
    try { await fetch(`${API}/attempts/results/${row.result_ID}`, { method: 'DELETE' }); toast('Deleted', 'success'); load(); }
    catch { toast('Error', 'error'); }
  };

  return React.createElement('div', null,
    React.createElement('div', { className: 'page-header' },
      React.createElement('div', { className: 'page-title' }, '🏅 Results'),
      React.createElement('div', { className: 'page-sub' }, 'Grades auto-calculated from marks obtained')
    ),
    React.createElement(DataTable, {
      columns: [
        { key: 'result_ID',      label: 'Result#', code: true },
        { key: 'student_name',   label: 'Student' },
        { key: 'reg_no',         label: 'Reg No', code: true },
        { key: 'exam_title',     label: 'Exam' },
        { key: 'marks_obtained', label: 'Marks', render: v => React.createElement('strong', { style: { color: 'var(--white)' } }, v) },
        { key: 'grade',  label: 'Grade',  render: v => React.createElement(GradeBadge, { grade: v }) },
        { key: 'status', label: 'Status', render: v => React.createElement(StatusBadge, { status: v }) },
      ],
      data, searchPlaceholder: '🔍  Search by student, grade, status...',
      onAdd:   () => { setForm({}); setErrors({}); setPreview(null); setModal({ isNew: true }); },
      onEdit:  row => { setForm({...row}); setErrors({}); setPreview(calcGrade(row.marks_obtained)); setModal({ ...row, isNew: false }); },
      onDelete: del,
    }),
    modal && React.createElement(Modal, {
      title: modal.isNew ? '+ Add Result' : `Edit Result #${modal.result_ID}`,
      fields: [
        modal.isNew && { key: 'attempt_ID',     label: 'Attempt ID',     type: 'number', placeholder: '1', required: true },
        { key: 'marks_obtained', label: 'Marks Obtained (0–100)', type: 'number', placeholder: '0–100', min: 0, max: 100, required: true },
      ].filter(Boolean),
      values: form, errors,
      onChange: (k, v) => {
        setForm(p => ({ ...p, [k]: v }));
        setErrors(p => ({ ...p, [k]: null }));
        if (k === 'marks_obtained' && v !== '') setPreview(calcGrade(v));
      },
      onSave: save, onClose: () => setModal(null),
      extra: preview && React.createElement('div', {
        style: { display: 'flex', gap: 12, alignItems: 'center', padding: '12px 0', borderTop: '1px solid var(--border)', marginTop: 8 }
      },
        React.createElement('span', { style: { fontSize: 12, color: 'var(--muted)' } }, 'Auto Grade:'),
        React.createElement(GradeBadge, { grade: preview.grade }),
        React.createElement(StatusBadge, { status: preview.status }),
      )
    })
  );
}

// ══════════════════════════════════════════════════════════════
//  ROOT APP
// ══════════════════════════════════════════════════════════════
function App() {
  const [page, setPage]   = useState('dashboard');
  const [toast, setToast] = useState(null);

  const showToast = (msg, type = 'success') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3500);
  };

  const NAV = [
    { id: 'dashboard',   label: 'Dashboard',    icon: '🏠', section: 'OVERVIEW' },
    { id: 'students',    label: 'Students',     icon: '🎓', section: 'PEOPLE' },
    { id: 'instructors', label: 'Instructors',  icon: '👨‍🏫' },
    { id: 'courses',     label: 'Courses',      icon: '📖', section: 'ACADEMICS' },
    { id: 'enrollments', label: 'Enrollments',  icon: '📋' },
    { id: 'exams',       label: 'Exams',        icon: '📝' },
    { id: 'questions',   label: 'Questions',    icon: '❓' },
    { id: 'attempts',    label: 'Attempts',     icon: '✅', section: 'ASSESSMENTS' },
    { id: 'results',     label: 'Results',      icon: '🏅' },
  ];

  const renderPage = () => {
    const p = { toast: showToast };
    switch (page) {
      case 'dashboard':   return React.createElement(Dashboard);
      case 'students':    return React.createElement(StudentsPage,    p);
      case 'instructors': return React.createElement(InstructorsPage, p);
      case 'courses':     return React.createElement(CoursesPage,     p);
      case 'enrollments': return React.createElement(EnrollmentsPage, p);
      case 'exams':       return React.createElement(ExamsPage,       p);
      case 'questions':   return React.createElement(QuestionsPage,   p);
      case 'attempts':    return React.createElement(AttemptsPage,    p);
      case 'results':     return React.createElement(ResultsPage,     p);
      default:            return null;
    }
  };

  let lastSection = null;

  return React.createElement('div', { className: 'layout' },
    React.createElement('aside', { className: 'sidebar' },
      React.createElement('div', { className: 'logo' },
        React.createElement('div', { className: 'logo-title' }, 'ExamVault'),
        React.createElement('div', { className: 'logo-sub' }, 'exam management system')
      ),
      React.createElement('nav', { className: 'nav' },
        ...NAV.flatMap(item => {
          const els = [];
          if (item.section && item.section !== lastSection) {
            lastSection = item.section;
            els.push(React.createElement('div', { className: 'nav-section', key: `sec-${item.section}` }, item.section));
          }
          els.push(React.createElement('div', {
            key: item.id,
            className: `nav-item ${page === item.id ? 'active' : ''}`,
            onClick: () => setPage(item.id)
          },
            React.createElement('span', { className: 'nav-icon' }, item.icon),
            item.label
          ));
          return els;
        })
      )
    ),
    React.createElement('main', { className: 'main' }, renderPage()),
    toast && React.createElement(Toast, { ...toast, onClose: () => setToast(null) })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
